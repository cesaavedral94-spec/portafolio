<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carlos Saavedra</title>

<!-- Fuente monoespaciada tipo consola -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:    #ffffff;     /* fondo blanco */
    --line:  #e2e5ea;     /* líneas que separan las áreas */
    --txt:   #14171c;     /* texto */
    --dim:   #8a909b;     /* texto apagado */
    --dot:   #2b7fc4;     /* puntos del cuaderno de sketch */

    /* Botones de selección de proyecto */
    --amber:    #c07d1f;          /* ámbar (contorno) */
    --green:    #1fa85d;          /* verde (proyecto activo) */
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    background:var(--bg);
    color:var(--txt);
    font-family:"Space Grotesk", system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  /* Estructura: header arriba, sidebar + main abajo */
  .app{
    display:grid;
    grid-template-rows:auto 1fr;
    height:100vh;
  }

  /* ---------- BARRA SUPERIOR ---------- */
  header{
    display:flex;
    align-items:center;
    padding:16px 22px;
    border-bottom:1px solid var(--line);   /* separación de área */
  }
  .title{
    font-family:"Share Tech Mono", monospace;
    font-size:clamp(18px, 3vw, 30px);
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--txt);
  }

  /* ---------- LAYOUT INFERIOR ---------- */
  .body{
    display:grid;
    grid-template-columns:240px 1fr;       /* sidebar | main */
    min-height:0;
  }

  /* ---------- ÁREA DE SELECCIÓN DE PROYECTO ---------- */
  .sidebar{
    overflow-y:auto;
    padding:18px 16px;
    background:var(--bg);                  /* blanco */
    border-right:1px solid var(--line);    /* separación de área */
  }

  .panel-title{
    font-family:"Share Tech Mono", monospace;
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--dim);
    margin-bottom:14px;
    display:block;
  }
  .divider{
    height:1px;
    background:var(--line);
    margin:14px 0;
  }

  /* Botón estilo terminal (contorno), adaptado a fondo blanco */
  .proj{
    width:100%;
    display:flex;
    align-items:center;
    gap:10px;
    padding:11px 13px;
    margin-bottom:10px;
    background:#fff;
    border:1.5px solid var(--amber);
    border-radius:9px;
    color:var(--amber);
    font-family:"Share Tech Mono", monospace;
    font-size:12.5px;
    letter-spacing:2px;
    text-transform:uppercase;
    text-align:left;
    cursor:pointer;
    transition:.15s;
  }
  .proj .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--amber);
    flex:0 0 auto;
  }
  .proj:hover{ background:rgba(224,162,58,.10); }

  /* Proyecto activo: verde */
  .proj.active{
    color:var(--green);
    border-color:var(--green);
    background:rgba(31,168,93,.10);
  }
  .proj.active .dot{ background:var(--green); }

  /* Menú desplegable de proyectos (solo en móvil/pantalla chica) */
  .proj-select{
    display:none;
    width:100%;
    padding:11px 13px;
    border:1.5px solid var(--amber);
    border-radius:9px;
    background:#fff;
    color:var(--amber);
    font-family:"Share Tech Mono", monospace;
    font-size:13px; letter-spacing:1px; text-transform:uppercase;
  }

  /* Área principal: fondo de cuaderno de sketch (puntos azules) */
  main{
    overflow-y:auto;
    padding:22px;
    background-image:radial-gradient(var(--dot) 1.4px, transparent 1.6px);
    background-size:26px 26px;            /* separación entre puntos */
    background-position:13px 13px;
  }

  /* Galería de tarjetas de proyecto */
  .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
    gap:18px;
  }

  /* Modo dinámico (solo escritorio full): tamaños variados + relleno compacto */
  .gallery.dynamic{
    grid-template-columns:repeat(var(--cols, 4), 1fr);
    grid-auto-rows:10px;
    grid-auto-flow:dense;
  }
  .gallery.dynamic .card{ height:100%; display:flex; flex-direction:column; }
  .gallery.dynamic .card .card-body{ height:auto; flex:1 1 auto; }

  /* Tarjeta (encabezado + área de imagen/video) */
  .card{
    position:relative;
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    background:transparent;               /* los puntos se asoman en el cuerpo */
    transition:.15s;
    cursor:pointer;                       /* clic = ventana de observación */
  }
  .card:hover{
    border-color:var(--amber);
    box-shadow:0 6px 18px rgba(0,0,0,.06);
  }

  .card-head{
    padding:12px 14px 11px;
    background:transparent;
    border-bottom:1px solid var(--line);
  }
  .card-title{
    font-family:"Share Tech Mono", monospace;
    font-size:20px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--txt);
    line-height:1.1;
  }
  .card-meta{
    display:flex; align-items:center; gap:7px;
    margin-top:5px;
    font-family:"Share Tech Mono", monospace;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--amber);
  }
  .card-meta .dot{ width:6px; height:6px; border-radius:50%; background:var(--amber); flex:0 0 auto; }

  /* Cuerpo: imagen o video */
  .card-body{
    height:200px;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .card-body img,
  .card-body video{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  /* Ajuste completo (no recorta): muestra todo el contenido */
  .card-body img.fit-contain,
  .card-body video.fit-contain{
    object-fit:contain;
    background:#fff;
  }

  /* ---------- VENTANA DE OBSERVACIÓN (clic en tarjeta) ---------- */
  .viewer{
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center; padding:24px;
    background:rgba(8,10,18,.6);
    -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
    opacity:0; pointer-events:none;
    transition:opacity .16s ease;
  }
  .viewer.open{ opacity:1; pointer-events:auto; }

  .viewer .vcard{
    width:min(92vw, 1100px);
    max-height:88vh;
    display:flex; flex-direction:column;
    background-color:#fff;
    background-image:radial-gradient(var(--dot) 1.4px, transparent 1.6px);
    background-size:26px 26px; background-position:13px 13px;
    border:1px solid var(--line); border-radius:12px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.4);
    transform:scale(.965);
    transition:transform .16s ease;
  }
  .viewer.open .vcard{ transform:scale(1); }
  .viewer .vcard .card-head{ background:transparent; }
  .viewer .vcard .card-body{
    height:auto; flex:1 1 auto; min-height:0;
    display:flex; align-items:center; justify-content:center;
  }
  .viewer .vcard .card-body img,
  .viewer .vcard .card-body video{
    width:auto; height:auto;
    max-width:100%; max-height:76vh;   /* nunca se recorta ni desborda */
    object-fit:contain;
  }
  .viewer-close{
    position:absolute; top:20px; right:24px; z-index:2;
    width:42px; height:42px; border-radius:10px;
    border:1px solid rgba(255,255,255,.3); background:rgba(255,255,255,.12);
    color:#fff; font-size:20px; cursor:pointer;
    display:grid; place-items:center;
  }
  .viewer-close:hover{ background:rgba(255,255,255,.22); }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 820px){
    .body{ grid-template-columns:1fr; grid-template-rows:auto 1fr; }
    .sidebar{
      border-right:none;
      border-bottom:1px solid var(--line);
    }
    /* En móvil: oculta los botones y la cuadrícula uniforme se mantiene; usa el dropdown */
    .sidebar .panel-title,
    .sidebar .divider,
    .sidebar .proj{ display:none; }
    .proj-select{ display:block; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- BARRA SUPERIOR -->
  <header>
    <div class="title" id="titulo"></div>
  </header>

  <div class="body">
    <nav class="sidebar" id="sidebar"></nav>
    <main><div class="gallery" id="gallery"></div></main>
  </div>

</div>

<!-- Ventana de observación (se abre al hacer clic en una tarjeta) -->
<div class="viewer" id="viewer">
  <button class="viewer-close" id="viewerClose" type="button" title="Cerrar">✕</button>
  <div class="vcard card" id="vcard"></div>
</div>

<script>
/* ============================================================
   CONTENIDO DEL PORTAFOLIO
   Cada proyecto es una pestaña. media: {tipo:"video"|"img", src, fit?}
   ============================================================ */
const CONFIG = {
  titulo: "Carlos Saavedra",
  panel:  "portafolio",
  proyectos: [

    { nombre: "net phone holder", imgCompleta: false, tarjetas: [
      { titulo:"Modelado 3d",     meta:"fusion 360",      media:{tipo:"video", src:"media/uso-padel.mp4"} },
      { titulo:"render",          meta:"en uso",          media:{tipo:"video", src:"media/close-up.mp4"} },
      { titulo:"vista",           meta:"GIRO 360°",       media:{tipo:"video", src:"media/proyecto-01.mp4"} },
      { titulo:"CLOSE UP · LOGO", meta:"ACABADO Y MARCA", media:{tipo:"video", src:"media/close-up-logo.mp4"} },
      { titulo:"vista",           meta:"FRONTAL",         media:{tipo:"img",   src:"media/proyecto-02.png"} },
      { titulo:"vista",           meta:"LOGO EN RELIEVE", media:{tipo:"img",   src:"media/logo-siete.png"} },
      { titulo:"PLANO",           meta:"DIBUJO TÉCNICO",  media:{tipo:"img",   src:"media/plano-2-1.png", fit:"contain"} },
    ]},

    { nombre: 'Silla "SS"', imgCompleta: true, tarjetas: [
      { titulo:"FOTOS",     meta:"PRODUCTO",       media:{tipo:"img",   src:"media/silla-fotos.png"} },
      { titulo:"BOCETO",    meta:"CONCEPTO",       media:{tipo:"img",   src:"media/silla-boceto.png"} },
      { titulo:"360°",         meta:"VISTA GENERAL",  media:{tipo:"video", src:"media/silla-360.mp4"} },
      { titulo:"EXPLOSIONADO", meta:"DESPIECE",       media:{tipo:"video", src:"media/silla-exp.mp4"} },
      { titulo:"MODELADO",     meta:"fusion 360",     media:{tipo:"video", src:"media/silla-render.mp4"} },
      { titulo:"PLANO",     meta:"DIBUJO TÉCNICO", media:{tipo:"img",   src:"media/plano-silla-1.png", fit:"contain"} },
    ]},

    { nombre: "Laptop stand", imgCompleta: false, tarjetas: [
      { titulo:"FOTOS",     meta:"PRODUCTO",       media:{tipo:"img",   src:"media/laptop-fotos.png"} },
      { titulo:"360°",      meta:"VISTA GENERAL",  media:{tipo:"video", src:"media/laptop-360.mp4"} },
      { titulo:"MODELADO",  meta:"fusion 360",     media:{tipo:"video", src:"media/laptop-modelado.mp4"} },
      { titulo:"PLANO",     meta:"DIBUJO TÉCNICO", media:{tipo:"img",   src:"media/plano-laptop-1.png", fit:"contain"} },
    ]},

    { nombre: "Mesa de Coser", imgCompleta: false, tarjetas: [
      { titulo:"FOTOS",     meta:"PRODUCTO",       media:{tipo:"img",   src:"media/mesa-fotos.png"} },
      { titulo:"360°",         meta:"VISTA GENERAL",  media:{tipo:"video", src:"media/mesa-360.mp4"} },
      { titulo:"MODELADO",     meta:"PROCESO",        media:{tipo:"video", src:"media/mesa-modelado.mp4"} },
      { titulo:"PLANO",     meta:"DIBUJO TÉCNICO", media:{tipo:"img",   src:"media/plano-mesa-1.png", fit:"contain"} },
    ]},

    { nombre: "Moldes Repostería", imgCompleta: true, tarjetas: [
      { titulo:"FOTOS",     meta:"IMPRESIÓN · 1",  media:{tipo:"img",   src:"media/molde-fotos-1.png"} },
      { titulo:"FOTOS",     meta:"IMPRESIÓN · 2",  media:{tipo:"img",   src:"media/molde-fotos-2.png"} },
      { titulo:"IMPRESIÓN", meta:"PROCESO",        media:{tipo:"video", src:"media/molde-impresion.mp4"} },
      { titulo:"MODELADO",  meta:"PROCESO · 1",    media:{tipo:"video", src:"media/molde-modelado-1.mp4"} },
      { titulo:"MODELADO",  meta:"PROCESO · 2",    media:{tipo:"video", src:"media/molde-modelado-2.mp4"} },
      { titulo:"MODELADO",  meta:"PROCESO · 3",    media:{tipo:"video", src:"media/molde-modelado-3.mp4"} },
      { titulo:"MODELADO",  meta:"PROCESO · 4",    media:{tipo:"video", src:"media/molde-modelado-4.mp4"} },
      { titulo:"CORAZÓN",   meta:"360°",           media:{tipo:"video", src:"media/molde-corazon-360.mp4"} },
      { titulo:"CORAZÓN",   meta:"EXPLOSIONADO",   media:{tipo:"video", src:"media/molde-corazon-exp.mp4"} },
      { titulo:"CIRCULAR",  meta:"360°",           media:{tipo:"video", src:"media/molde-circular-360.mp4"} },
      { titulo:"CIRCULAR",  meta:"EXPLOSIONADO",   media:{tipo:"video", src:"media/molde-circular-exp.mp4"} },
      { titulo:"CUADRADO",  meta:"360°",           media:{tipo:"video", src:"media/molde-cuadrado-360.mp4"} },
      { titulo:"CUADRADO",  meta:"EXPLOSIONADO",   media:{tipo:"video", src:"media/molde-cuadrado-exp.mp4"} },
      { titulo:"PLANO",     meta:"CORAZÓN",        media:{tipo:"img",   src:"media/plano-molde-a-1.png", fit:"contain"} },
      { titulo:"PLANO",     meta:"CIRCULAR",       media:{tipo:"img",   src:"media/plano-molde-b-1.png", fit:"contain"} },
      { titulo:"PLANO",     meta:"CUADRADO",       media:{tipo:"img",   src:"media/plano-molde-c-1.png", fit:"contain"} },
    ]},

    { nombre: 'Estantería "SS"', imgCompleta: true, tarjetas: [
      { titulo:"AMBIENTE",     meta:"RENDER",         media:{tipo:"img",   src:"media/estanteria-ambiente.jpg"} },
      { titulo:"FOTOS",        meta:"PRODUCTO",       media:{tipo:"img",   src:"media/tubo-fotos.png"} },
      { titulo:"360°",         meta:"VISTA GENERAL",  media:{tipo:"video", src:"media/tubo-360.mp4"} },
      { titulo:"EXPLOSIONADO", meta:"DESARMABLE",     media:{tipo:"video", src:"media/tubo-exp.mp4"} },
      { titulo:"MODELADO",     meta:"PROCESO",        media:{tipo:"video", src:"media/tubo-modelado.mp4"} },
      { titulo:"VISTA",        meta:"PREVIEW",        media:{tipo:"video", src:"media/tubo-render.mp4"} },
      { titulo:"PLANO",        meta:"DIBUJO TÉCNICO", media:{tipo:"img",   src:"media/plano-tubo-1.png", fit:"contain"} },
    ]},

  ],
};

/* ====================  motor (no es necesario editar)  ==================== */
const $ = (s)=>document.querySelector(s);
const gal = $("#gallery"), sb = $("#sidebar");
let view = "home";   // "home" (página de inicio) o índice de proyecto

// Cuántas tarjetas de cada proyecto se muestran en Inicio
const HOME_POR_PROYECTO = 2;

// Tarjetas a mostrar según la vista actual
function currentCards(){
  if (view === "home"){
    const sel = [];
    CONFIG.proyectos.forEach(p=>{
      p.tarjetas.slice(0, HOME_POR_PROYECTO).forEach(c=> sel.push({ ...c, _img:p.imgCompleta }));
    });
    return sel;
  }
  const p = CONFIG.proyectos[view];
  return p.tarjetas.map(c=> ({ ...c, _img:p.imgCompleta }));
}

function mediaHTML(m, titulo, forceContain){
  if (!m) return "";
  if (m.tipo === "img") return `<img src="${m.src}" class="fit-contain" alt="${titulo||""}" draggable="false">`;
  if (m.tipo === "video"){
    const cls = (m.fit === "contain" || forceContain) ? ' class="fit-contain"' : "";
    return `<video src="${m.src}"${cls} autoplay loop muted playsinline draggable="false"></video>`;
  }
  return "";
}

function sidebarBtn(label, isActive, onClick){
  const b = document.createElement("button");
  b.type = "button";
  b.className = "proj" + (isActive ? " active" : "");
  b.innerHTML = `<span class="dot"></span><span class="proj-text">${label}</span>`;
  b.addEventListener("click", onClick);
  sb.appendChild(b);
}

function render(){
  $("#titulo").textContent = CONFIG.titulo;

  // Panel de proyectos (la vista de Inicio es la predeterminada, sin botón propio)
  sb.innerHTML = `<span class="panel-title">${CONFIG.panel}</span><div class="divider"></div>`;
  CONFIG.proyectos.forEach((p, i)=>{
    sidebarBtn(p.nombre, view === i, ()=>{ if (view !== i){ view = i; render(); } });
  });

  // Menú desplegable equivalente (se muestra solo en móvil)
  const sel = document.createElement("select");
  sel.className = "proj-select";
  sel.innerHTML = `<option value="home"${view === "home" ? " selected" : ""}>Inicio</option>` +
    CONFIG.proyectos.map((p, i)=>`<option value="${i}"${view === i ? " selected" : ""}>${p.nombre}</option>`).join("");
  sel.addEventListener("change", ()=>{
    const v = sel.value === "home" ? "home" : parseInt(sel.value, 10);
    if (v !== view){ view = v; render(); }
  });
  sb.appendChild(sel);

  // Galería de la vista actual
  gal.innerHTML = "";
  currentCards().forEach(c=>{
    const art = document.createElement("article");
    art.className = "card";
    art.innerHTML = `
      <div class="card-head">
        <div class="card-title">${c.titulo}</div>
        <div class="card-meta"><span class="dot"></span><span class="meta-text">${c.meta}</span></div>
      </div>
      <div class="card-body">${mediaHTML(c.media, c.titulo, c._img)}</div>`;
    art.addEventListener("click", ()=> openViewer(c));
    gal.appendChild(art);
  });

  layout();
}

/* ---- Disposiciones dinámicas: 5 plantillas curadas que rotan en cada carga ---- */
const PRESETS = [
  [ {c:2,h:24}, {c:2,h:14}, {c:1,h:19}, {c:1,h:19}, {c:1,h:14}, {c:1,h:14} ],
  [ {c:2,h:14}, {c:2,h:24}, {c:1,h:14}, {c:1,h:14}, {c:1,h:19}, {c:1,h:19} ],
  [ {c:1,h:19}, {c:1,h:14}, {c:2,h:16}, {c:1,h:14}, {c:1,h:19}, {c:2,h:14} ],
  [ {c:1,h:22}, {c:1,h:12}, {c:1,h:16}, {c:1,h:20}, {c:2,h:14}, {c:1,h:18} ],
  [ {c:2,h:16}, {c:1,h:20}, {c:1,h:12}, {c:2,h:14}, {c:1,h:16}, {c:1,h:22} ],
];
const LIDX = "portafolio-layout-idx";
const presetIndex = (parseInt(localStorage.getItem(LIDX) || "-1", 10) + 1) % PRESETS.length;
try { localStorage.setItem(LIDX, presetIndex); } catch(e){}

const DESKTOP_MIN = 1000;   // bajo este ancho -> cuadrícula uniforme
const DYN_COLS = 4;
function layout(){
  const wide = window.innerWidth >= DESKTOP_MIN;
  const cards = [...gal.querySelectorAll(".card")];
  if (!wide){
    gal.classList.remove("dynamic");
    gal.style.removeProperty("--cols");
    cards.forEach(c=>{ c.style.gridColumn=""; c.style.gridRow=""; });
    return;
  }
  const tiles = PRESETS[presetIndex];
  gal.classList.add("dynamic");
  gal.style.setProperty("--cols", DYN_COLS);
  cards.forEach((c, i)=>{
    const t = tiles[i % tiles.length];
    c.style.gridColumn = "span " + Math.min(t.c, DYN_COLS);
    c.style.gridRow    = "span " + t.h;
  });
}
let _rt;
window.addEventListener("resize", ()=>{ clearTimeout(_rt); _rt = setTimeout(layout, 150); });

/* ---- Ventana de observación ---- */
const viewer = $("#viewer"), vcard = $("#vcard");
function openViewer(c){
  vcard.innerHTML = `
    <div class="card-head">
      <div class="card-title">${c.titulo}</div>
      <div class="card-meta"><span class="dot"></span><span class="meta-text">${c.meta}</span></div>
    </div>
    <div class="card-body">${mediaHTML(c.media, c.titulo)}</div>`;
  viewer.classList.add("open");
}
function closeViewer(){
  viewer.classList.remove("open");
  setTimeout(()=>{ if (!viewer.classList.contains("open")) vcard.innerHTML = ""; }, 200);
}
$("#viewerClose").addEventListener("click", closeViewer);
viewer.addEventListener("click", (e)=>{ if (e.target === viewer) closeViewer(); });
document.addEventListener("keydown", (e)=>{ if (e.key === "Escape") closeViewer(); });

// El nombre del encabezado vuelve a la vista de Inicio
const tit = $("#titulo");
tit.style.cursor = "pointer";
tit.title = "Inicio";
tit.addEventListener("click", ()=>{ if (view !== "home"){ view = "home"; render(); } });

render();
</script>
</body>
</html>
